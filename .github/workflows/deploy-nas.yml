name: Deploy to NAS

on:
  # push 자동 배포는 NAS SSH 포트포워딩/Tailscale 준비 후 활성화
  workflow_dispatch:

concurrency:
  group: nas-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT }}
          script_stop: true
          script: |
            set -eu
            DEPLOY_PATH="${{ secrets.NAS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/volume1/docker/heavyjungle"; fi
            cd "$DEPLOY_PATH"
            chmod +x scripts/nas-deploy.sh
            ./scripts/nas-deploy.sh
